<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="48" fill="#BB4500"/>
  <!-- Wrench (left-top to right-bottom diagonal) -->
  <g transform="translate(50,50) rotate(-45)">
    <rect x="-4" y="-32" width="8" height="64" rx="4" fill="white"/>
    <ellipse cx="0" cy="-32" rx="10" ry="8" fill="white"/>
    <ellipse cx="0" cy="32" rx="10" ry="8" fill="white"/>
    <ellipse cx="0" cy="-32" rx="5" ry="4" fill="#BB4500"/>
    <ellipse cx="0" cy="32" rx="5" ry="4" fill="#BB4500"/>
  </g>
  <!-- Screwdriver (right-top to left-bottom diagonal) -->
  <g transform="translate(50,50) rotate(45)">
    <rect x="-3" y="-30" width="6" height="55" rx="3" fill="white"/>
    <rect x="-5" y="25" width="10" height="5" rx="1" fill="white"/>
    <rect x="-2.5" y="30" width="5" height="12" rx="2" fill="white"/>
  </g>
  <!-- Center cover -->
  <circle cx="50" cy="50" r="7" fill="#BB4500"/>
</svg>
